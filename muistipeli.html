<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/peli.css">
</head>

<body>

<header class="header">
  <h1>Järvikalat muistipeli</h1>
  <nav>
    <a href="index.html">Etusivu</a>
    <a href="muistipeli.html">Peli</a>
    <a href="info.html">Info</a>
  </nav>
</header>

<div class="game-container">

  <button onclick="location.reload()">Uusi Peli</button>

  <div class="game-info">
    <span>Siirrot: <span id="moves">0</span></span>
    <span>Aika: <span id="timer">0s</span></span>
    <div id="fish-name"></div>
  </div>

  <main id="game" class="game-board"></main>

</div>

<div id="win-screen" class="hidden">
  <p>Aika: <span id="final-time"></span></p>
  <p>Siirrot: <span id="final-moves"></span></p>
  <p>Pisteet: <span id="final-score"></span></p>
  <button onclick="location.reload()">Pelaa uudestaan</button>
</div>
